  <script>
    const beep = document.getElementById("beep-sound");

    window.addEventListener("load", () => {
      if (beep) {
        beep.currentTime = 0;
        beep.play().catch((e) => {
          console.log("Autoplay blocked:", e);
        });
      }
    });

    document.addEventListener("click", () => {
      if (beep) {
        beep.currentTime = 0;
        beep.play().catch((e) => {
          console.log("Click play failed:", e);
        });
      }
    });

    /* ---------- Matrix decrypt/encrypt effect ---------- */
    const SCRAMBLE_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/\\";
    const isWhitespace = (c) => c === ' ' || c === '\n' || c === '\t';
    const randChar = () => SCRAMBLE_CHARS[(Math.random() * SCRAMBLE_CHARS.length) | 0];

    class MatrixText {
      constructor(el) {
        this.el = el;
        this.original = el.textContent;
        this.chars = [...this.original];
        this.revealed = this.chars.map(() => false);
        this.render();
      }

      render() {
        let out = '';
        for (let i = 0; i < this.chars.length; i++) {
          const c = this.chars[i];
          if (isWhitespace(c)) out += c;
          else if (this.revealed[i]) out += c;
          else out += randChar();
        }
        this.el.textContent = out;
      }

      scrambleAll() {
        for (let i = 0; i < this.revealed.length; i++) this.revealed[i] = false;
        this.render();
      }

      revealIndices() {
        const idx = [];
        for (let i = 0; i < this.chars.length; i++) {
          if (!isWhitespace(this.chars[i])) idx.push(i);
        }
        // shuffle
        for (let i = idx.length - 1; i > 0; i--) {
          const j = (Math.random() * (i + 1)) | 0;
          [idx[i], idx[j]] = [idx[j], idx[i]];
        }
        return idx;
      }

      decrypt(duration = 1200) {
        const order = this.revealIndices();
        if (order.length === 0) return Promise.resolve();
        const perChar = Math.max(12, duration / order.length);
        const start = performance.now();
        let revealed = 0;

        return new Promise((resolve) => {
          const tick = () => {
            const elapsed = performance.now() - start;
            const target = Math.min(order.length, Math.floor(elapsed / perChar));
            while (revealed < target) {
              this.revealed[order[revealed]] = true;
              revealed++;
            }
            this.render();
            if (revealed < order.length) {
              requestAnimationFrame(tick);
            } else {
              resolve();
            }
          };
          requestAnimationFrame(tick);
        });
      }

      flicker() {
        const live = [];
        for (let i = 0; i < this.chars.length; i++) {
          if (!isWhitespace(this.chars[i]) && this.revealed[i]) live.push(i);
        }
        if (!live.length) return;
        const idx = live[(Math.random() * live.length) | 0];
        this.revealed[idx] = false;
        this.render();
        setTimeout(() => {
          this.revealed[idx] = true;
          this.render();
        }, 50 + Math.random() * 150);
      }
    }

    const instances = [...document.querySelectorAll('.matrix-text')].map(el => new MatrixText(el));

    (async () => {
      // Staggered initial decrypt
      await Promise.all(instances.map((m, i) =>
        new Promise(res => setTimeout(res, i * 60))
          .then(() => m.decrypt(900 + Math.random() * 700))
      ));

      // Continuous subtle flicker — a few chars at a time across random elements
      setInterval(() => {
        const count = 2 + ((Math.random() * 3) | 0);
        for (let k = 0; k < count; k++) {
          const m = instances[(Math.random() * instances.length) | 0];
          m.flicker();
        }
      }, 110);

      // Periodic full re-scramble + decrypt on a random element
      setInterval(() => {
        const m = instances[(Math.random() * instances.length) | 0];
        m.scrambleAll();
        setTimeout(() => m.decrypt(700 + Math.random() * 800), 120);
      }, 2800);
    })();
  </script>
