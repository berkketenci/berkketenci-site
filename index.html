    .plate-tint {

      flex-direction: column;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.9s ease-out 0.1s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sprig {
      width: 70px; height: 90px; margin: 0 auto 1.6rem; display: block;
      transform-origin: 50% 95%;
      animation: sway 7s ease-in-out infinite;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-3deg); }
      50%      { transform: rotate(3deg); }
    }

    h1 {
      font-weight: 500;
      font-size: clamp(2.2rem, 5.5vw, 3.4rem);

    .rule {
      display: flex; align-items: center; gap: 0.9rem;
      width: 75%; margin: 0 auto 2rem;
      color: var(--rose);
    }
    .rule::before, .rule::after {
      content: ''; flex: 1; height: 1px; background: var(--rule);
    }
    .rule span { font-size: 1.05rem; letter-spacing: 0.15em; color: var(--rose); }

    nav ol {

    nav a .num {

    }
    nav a .label { flex: 1; font-size: clamp(1.1rem, 2.3vw, 1.35rem); }
    nav a .arrow {
      color: var(--rose); opacity: 0.55;
      transition: transform 220ms, opacity 220ms;
      font-style: italic;
    }
    nav a:hover {
      background: rgba(217, 182, 176, 0.25);
      padding-left: 0.9rem;
    }
    nav a:hover .arrow { transform: translateX(6px); opacity: 1; }

    footer {
