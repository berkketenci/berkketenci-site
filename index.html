    html, body {

    body {

      line-height: 1.35;
      font-feature-settings: "liga" 0, "clig" 0;
      font-variant-ligatures: none;
    }

    /* Scanline bars */
    body::before,
    body::after {
      content: "";

      left: 0;

      height: 18px;
      background: white;
      animation: blinkBody 1s infinite;

    body::before { top: 30%; }

    @keyframes blinkBody {

    /* Matrix rain canvas */
    #mxrain {

    .container {

    .selection-line {

    .cursor-line {
      border-top: 2px solid #0AFF0A;
      margin-top: 0.4em;

      display: flex;

    }
    .cursor-line span.cursor-blink {
      display: inline-block;
      width: 0.4em;

      background-color: #0AFF0A;

    .copyright {

    }

    /* matrix line is a single-row strip */
    .matrix-text {
      display: block;
      white-space: nowrap;
      overflow: hidden;
    }

    /* fixed-width character cells so proportional Garamond still aligns in a grid */
    .mx-char {
      display: inline-block;
      width: 0.62em;
      text-align: center;
      overflow: hidden;
      vertical-align: baseline;
      transition: color 0.08s linear, text-shadow 0.08s linear;
    }
    .mx-char.hot {
      color: #FFFFFF;
      text-shadow:
        0 0 4px #FFF,
        0 0 10px #0AFF0A,
        0 0 18px #0AFF0A;
    }
    .mx-char.warm {
      color: #B8FFB8;
      text-shadow: 0 0 6px rgba(10, 255, 10, 0.7);
    }
    .mx-char.dim {
      color: rgba(10, 255, 10, 0.45);
    }

    .matrix-text.glitch {
      animation: glitch 0.18s steps(2) 0s 3;
    }
    @keyframes glitch {
      0%   { transform: translateX(0);   filter: hue-rotate(0deg); }
      25%  { transform: translateX(3px); filter: hue-rotate(-40deg); }
      50%  { transform: translateX(-2px); filter: hue-rotate(20deg); }
      75%  { transform: translateX(1px); filter: hue-rotate(-10deg); }
      100% { transform: translateX(0);   filter: hue-rotate(0deg); }
    }

<body>

  <audio id="beep-sound" src="./445976__breviceps__error-signal-1.wav" preload="auto"></audio>

  <script>
    const beep = document.getElementById("beep-sound");
    window.addEventListener("load", () => {
      if (beep) { beep.currentTime = 0; beep.play().catch(() => {}); }
    });
    document.addEventListener("click", () => {
      if (beep) { beep.currentTime = 0; beep.play().catch(() => {}); }
    });

    /* ================= Matrix rain background ================= */
    (() => {
      const canvas = document.getElementById('mxrain');
      const ctx = canvas.getContext('2d');
      const RAIN_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ0123456789ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";
      let W = 0, H = 0, cols = 0, drops = [], fontPx = 16, dpr = 1;

      function setup() {
        dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        fontPx = Math.max(14, Math.min(22, Math.floor(W / 90)));
        cols = Math.ceil(W / fontPx);
        drops = Array.from({ length: cols }, () => Math.random() * -60);
      }
      setup();
      window.addEventListener('resize', setup);

      function tick() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.09)';
        ctx.fillRect(0, 0, W, H);
        ctx.font = fontPx + "px 'EB Garamond', monospace";
        for (let i = 0; i < cols; i++) {
          const x = i * fontPx;
          const y = drops[i] * fontPx;
          const ch = RAIN_CHARS[(Math.random() * RAIN_CHARS.length) | 0];
          // bright head
          ctx.fillStyle = 'rgba(220, 255, 220, 0.95)';
          ctx.fillText(ch, x, y);
          // trailing (drawn at previous position with green)
          ctx.fillStyle = 'rgba(10, 255, 10, 0.85)';
          ctx.fillText(
            RAIN_CHARS[(Math.random() * RAIN_CHARS.length) | 0],
            x,
            y - fontPx
          );
          if (y > H && Math.random() > 0.975) drops[i] = 0;
          drops[i] += 0.6 + Math.random() * 0.9;
        }
      }
      setInterval(tick, 55);
    })();

    /* ================= Foreground matrix lines ================= */

    const CHARS =
      "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz" +
      "0123456789" +
      "!@#$%^&*()_+-=[]{}|;:,.<>?/\\~" +
      "ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";
    const randChar = () => CHARS[(Math.random() * CHARS.length) | 0];

    function measureCharWidth(el) {
      // We ourselves use 0.62em cells — compute from that.
      const fs = parseFloat(getComputedStyle(el).fontSize) || 20;
      return fs * 0.62;
    }

    class MatrixLine {
      constructor(el) {
        this.el = el;
        this.original = (el.textContent || '').trim();
        const align = getComputedStyle(el).textAlign;
        this.align = (align === 'right' || align === 'end') ? 'right' : 'left';

        // clear and create spans
        el.textContent = '';
        this.spans = [];
        this.fit();
        this.build();

        this.buffer = Array.from(
          { length: Math.max(this.totalChars * 3, 120) },
          randChar
        );
        this.offset = 0;

        this.revealed = 0;
        this.state = 'loading';
        this.loadDuration = 300 + Math.random() * 450;
        this.revealSpeed = 25 + Math.random() * 25;
        this.slideInterval = 35 + Math.random() * 35;

        this.loadStart = performance.now() + Math.random() * 400;
        this.lastSlide = 0;

        this.render();
      }

      fit() {
        const charW = measureCharWidth(this.el);
        const lineW =
          this.el.clientWidth ||
          (this.el.parentElement && this.el.parentElement.clientWidth) ||
          320;
        this.totalChars = Math.max(
          this.original.length + 4,
          Math.floor(lineW / charW) - 1
        );
      }

      build() {
        const frag = document.createDocumentFragment();
        this.spans = [];
        for (let i = 0; i < this.totalChars; i++) {
          const s = document.createElement('span');
          s.className = 'mx-char';
          s.textContent = ' ';
          this.spans.push(s);
          frag.appendChild(s);
        }
        this.el.appendChild(frag);
      }

      rebuild() {
        this.el.textContent = '';
        this.build();
      }

      charAt(i) {
        return this.buffer[(i + this.offset) % this.buffer.length];
      }

      render() {
        const n = this.totalChars;
        const L = this.original.length;
        const textStart = this.align === 'right' ? n - L : 0;

        for (let i = 0; i < n; i++) {
          const p = i - textStart;
          const inText = p >= 0 && p < L;
          let reveal = false;
          if (inText) {
            if (this.align === 'right') reveal = p >= L - this.revealed;
            else reveal = p < this.revealed;
          }
          const span = this.spans[i];
          if (!span) continue;
          const newChar = reveal ? this.original[p] : this.charAt(i);
          if (span.firstChild && span.firstChild.nodeType === 3) {
            if (span.firstChild.nodeValue !== newChar) span.firstChild.nodeValue = newChar;
          } else {
            span.textContent = newChar;
          }
        }
      }

      slide() {
        this.offset++;
        const bi = (Math.random() * this.buffer.length) | 0;
        this.buffer[bi] = randChar();

        // Sparkle: briefly hot / warm on random positions
        if (Math.random() < 0.55) {
          const idx = (Math.random() * this.totalChars) | 0;
          const span = this.spans[idx];
          if (span) {
            const cls = Math.random() < 0.35 ? 'hot' : 'warm';
            span.classList.add(cls);
            const ttl = 90 + Math.random() * 260;
            setTimeout(() => span.classList.remove(cls), ttl);
          }
        }
      }

      tick(now) {
        if (now < this.loadStart) return;
        let dirty = false;

        if (now - this.lastSlide >= this.slideInterval) {
          this.slide();
          this.lastSlide = now;
          dirty = true;
        }

        if (this.state === 'loading') {
          if (now - this.loadStart >= this.loadDuration) {
            this.state = 'revealing';
            this.revealStart = now;
          }
        } else if (this.state === 'revealing') {
          const target = Math.min(
            this.original.length,
            Math.floor((now - this.revealStart) / this.revealSpeed)
          );
          if (target !== this.revealed) {
            this.revealed = target;
            dirty = true;
          }
          if (this.revealed >= this.original.length) this.state = 'idle';
        }

        if (dirty) this.render();
      }

      restart() {
        this.state = 'loading';
        this.revealed = 0;
        this.loadDuration = 200 + Math.random() * 500;
        this.revealSpeed = 22 + Math.random() * 28;
        this.loadStart = performance.now();
      }

      glitch() {
        this.el.classList.remove('glitch');
        // reflow to replay animation
        void this.el.offsetWidth;
        this.el.classList.add('glitch');

        const saved = this.revealed;
        const savedState = this.state;
        this.revealed = 0;
        this.render();
        setTimeout(() => {
          this.revealed = saved;
          this.state = savedState;
          this.render();
        }, 120 + Math.random() * 180);
      }
    }

    function init() {
      const nodes = [...document.querySelectorAll('.matrix-text')];
      const lines = nodes.map((el, i) => {
        const m = new MatrixLine(el);
        m.loadStart = performance.now() + i * 90 + Math.random() * 120;
        return m;
      });

      function frame(now) {
        for (const l of lines) l.tick(now);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      // Frequent re-load cycles on random idle lines
      setInterval(() => {
        if (!lines.length) return;
        const l = lines[(Math.random() * lines.length) | 0];
        if (l.state === 'idle') l.restart();
      }, 1800);

      // Occasional glitch bursts
      setInterval(() => {
        if (Math.random() < 0.55) {
          const idle = lines.filter(l => l.state === 'idle');
          if (idle.length) {
            const l = idle[(Math.random() * idle.length) | 0];
            l.glitch();
          }
        }
      }, 700);

      // Rebuild on resize
      let resizeTO;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTO);
        resizeTO = setTimeout(() => {
          for (const l of lines) {
            l.fit();
            l.rebuild();
            l.buffer = Array.from(
              { length: Math.max(l.totalChars * 3, 120) },
              randChar
            );
            l.render();
          }
        }, 120);
      });
    }

    // Wait for fonts so char-width calc uses final metrics
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(init);
    } else {
      window.addEventListener('load', init);
    }
  </script>
