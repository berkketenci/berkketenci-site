  <style>
    :root {
      --paper:   #F7F2EA;
      --paper-2: #FBF7F0;
      --ink:     #2B231D;
      --muted:   #7A6B5F;
      --rose:    #B58B85;
      --rose-2:  #D9B6B0;
      --sage:    #8CA085;
      --rule:    #D7CBB9;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      background-color: var(--paper);
      background-image:
        radial-gradient(1200px 700px at 12% 10%, rgba(217, 182, 176, 0.28), transparent 60%),
        radial-gradient(1100px 700px at 88% 90%, rgba(140, 160, 133, 0.18), transparent 60%),
        radial-gradient(900px 600px at 50% 50%, rgba(255, 250, 242, 0.7), transparent 70%);
      background-attachment: fixed;
      color: var(--ink);
      font-family: 'EB Garamond', 'Garamond', 'Times New Roman', serif;
      font-size: clamp(18px, 1.9vmin, 22px);
      line-height: 1.55;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6vh 6vw;
      opacity: 0;
      animation: fadeUp 0.9s ease-out 0.1s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    main.page {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .sprig {
      width: 70px;
      height: 90px;
      margin: 0 auto 1.6rem;
      display: block;
      transform-origin: 50% 95%;
      animation: sway 7s ease-in-out infinite;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-3deg); }
      50%      { transform: rotate(3deg); }
    }

    h1 {
      font-family: 'EB Garamond', serif;
      font-weight: 500;
      font-size: clamp(2.2rem, 5.5vw, 3.4rem);
      letter-spacing: 0.005em;
      margin: 0 0 0.35em 0;
      line-height: 1.1;
    }

    .epigraph {
      font-style: italic;
      color: var(--muted);
      font-size: clamp(1.05rem, 2.2vw, 1.3rem);
      margin: 0 0 2.4rem 0;
      letter-spacing: 0.01em;
    }

    /* Ornamental rule with a centered glyph */
    .rule {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      width: 75%;
      margin: 0 auto 2rem;
      color: var(--rose);
    }
    .rule::before, .rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .rule span {
      font-size: 1.05rem;
      letter-spacing: 0.15em;
      color: var(--rose);
      transform: translateY(-1px);
    }

    /* Menu — like a book's table of contents */
    nav ol {
      list-style: none;
      padding: 0;
      margin: 0 0 2.4rem 0;
      text-align: left;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }
    nav li {
      margin: 0.45rem 0;
    }
    nav a {
      display: flex;
      align-items: baseline;
      gap: 0.9rem;
      text-decoration: none;
      color: var(--ink);
      padding: 0.35rem 0.5rem;
      border-radius: 3px;
      transition: color 220ms ease, background 220ms ease, padding 220ms ease;
    }
    nav a .num {
      font-style: italic;
      color: var(--sage);
      min-width: 2.4ch;
      text-align: right;
      font-feature-settings: "onum";
    }
    nav a .label {
      flex: 1;
      font-size: clamp(1.1rem, 2.3vw, 1.35rem);
    }
    nav a .arrow {
      color: var(--rose);
      opacity: 0.55;
      transform: translateX(0);
      transition: transform 220ms ease, opacity 220ms ease;
      font-style: italic;
    }
    nav a:hover {
      background: rgba(217, 182, 176, 0.18);
      color: #1A130E;
      padding-left: 0.9rem;
    }
    nav a:hover .arrow {
      transform: translateX(6px);
      opacity: 1;
    }
    nav a:focus-visible {
      outline: 1px dashed var(--rose);
      outline-offset: 3px;
    }

    footer {
      color: var(--muted);
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
    }

    ::selection {
      background: var(--rose-2);
      color: #1A130E;
    }
  </style>
</head>
