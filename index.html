  <audio id="beep-sound" src="./445976__breviceps__error-signal-1.wav" preload="auto"></audio>

  <script>
    const beep = document.getElementById("beep-sound");
    window.addEventListener("load", () => {
      if (beep) { beep.currentTime = 0; beep.play().catch(() => {}); }
    });
    document.addEventListener("click", () => {
      if (beep) { beep.currentTime = 0; beep.play().catch(() => {}); }
    });

    /* ---------------- Matrix sliding/loading lines ---------------- */

    const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/\\~";
    const randChar = () => CHARS[(Math.random() * CHARS.length) | 0];

    function measureCharWidth(el) {
      const probe = document.createElement('span');
      probe.style.cssText =
        'visibility:hidden;position:absolute;white-space:pre;' +
        'font-family:inherit;font-size:inherit;font-weight:inherit;';
      probe.textContent = 'M'.repeat(30);
      el.appendChild(probe);
      const w = probe.getBoundingClientRect().width / 30;
      probe.remove();
      return w || 10;
    }

    class MatrixLine {
      constructor(el) {
        this.el = el;
        this.original = (el.textContent || '').trim();
        const align = getComputedStyle(el).textAlign;
        this.align = (align === 'right' || align === 'end') ? 'right' : 'left';

        this.fit();
        this.buffer = Array.from(
          { length: Math.max(this.totalChars * 3, 80) },
          randChar
        );
        this.offset = 0;

        this.revealed = 0;
        this.state = 'loading';        // loading -> revealing -> idle
        this.loadDuration = 350 + Math.random() * 450;
        this.revealSpeed = 35 + Math.random() * 25; // ms per char
        this.slideInterval = 50 + Math.random() * 40;

        this.loadStart = performance.now() + Math.random() * 400;
        this.lastSlide = 0;

        this.render();
      }

      fit() {
        const charW = measureCharWidth(this.el);
        const lineW =
          this.el.clientWidth ||
          (this.el.parentElement && this.el.parentElement.clientWidth) ||
          300;
        this.totalChars = Math.max(
          this.original.length + 4,
          Math.floor(lineW / charW) - 1
        );
      }

      charAt(i) {
        return this.buffer[(i + this.offset) % this.buffer.length];
      }

      render() {
        const n = this.totalChars;
        const L = this.original.length;
        const textStart = this.align === 'right' ? n - L : 0;

        let out = '';
        for (let i = 0; i < n; i++) {
          const p = i - textStart;
          const inText = p >= 0 && p < L;
          let reveal = false;
          if (inText) {
            if (this.align === 'right') {
              reveal = p >= L - this.revealed;
            } else {
              reveal = p < this.revealed;
            }
          }
          out += reveal ? this.original[p] : this.charAt(i);
        }
        this.el.textContent = out;
      }

      slide() {
        this.offset++;
        // churn the buffer so it doesn't look like a repeating strip
        const idx = (Math.random() * this.buffer.length) | 0;
        this.buffer[idx] = randChar();
      }

      tick(now) {
        if (now < this.loadStart) return;

        let dirty = false;

        if (now - this.lastSlide >= this.slideInterval) {
          this.slide();
          this.lastSlide = now;
          dirty = true;
        }

        if (this.state === 'loading') {
          if (now - this.loadStart >= this.loadDuration) {
            this.state = 'revealing';
            this.revealStart = now;
          }
        } else if (this.state === 'revealing') {
          const target = Math.min(
            this.original.length,
            Math.floor((now - this.revealStart) / this.revealSpeed)
          );
          if (target !== this.revealed) {
            this.revealed = target;
            dirty = true;
          }
          if (this.revealed >= this.original.length) {
            this.state = 'idle';
          }
        }

        if (dirty) this.render();
      }

      restart() {
        this.state = 'loading';
        this.revealed = 0;
        this.loadDuration = 300 + Math.random() * 500;
        this.revealSpeed = 30 + Math.random() * 30;
        this.loadStart = performance.now();
      }
    }

    const lines = [...document.querySelectorAll('.matrix-text')]
      .map((el, i) => {
        const m = new MatrixLine(el);
        m.loadStart = performance.now() + i * 120 + Math.random() * 80;
        return m;
      });

    function frame(now) {
      for (const l of lines) l.tick(now);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // Periodically re-scramble a random line so it keeps loading
    setInterval(() => {
      if (!lines.length) return;
      const l = lines[(Math.random() * lines.length) | 0];
      if (l.state === 'idle') l.restart();
    }, 2600);

    // Rebuild dimensions on resize
    let resizeTO;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTO);
      resizeTO = setTimeout(() => {
        for (const l of lines) {
          l.fit();
          l.buffer = Array.from(
            { length: Math.max(l.totalChars * 3, 80) },
            randChar
          );
        }
      }, 120);
    });
  </script>
